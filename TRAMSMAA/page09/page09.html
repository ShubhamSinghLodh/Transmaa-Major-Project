<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 9 - Background Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #f7f2eb;
      --paper: #fffdfa;
      --ink: #2a201d;
      --frame: #66605d;
      --top-bg: #d8d6d6;
      --surface: #ffffff;
      --shadow: 0 8px 18px rgba(53, 32, 21, 0.08);
      --success: #37f216;
      --danger: #ef4a3f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(243, 228, 214, 0.76), rgba(255, 255, 255, 0) 8%, rgba(255, 255, 255, 0) 92%, rgba(243, 228, 214, 0.76)),
        var(--page-bg);
    }

    .page {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .sheet {
      min-height: 740px;
      background: var(--paper);
      border-top: 4px solid #efe4da;
      border-bottom: 4px solid #d9ccc0;
      box-shadow: 0 3px 12px rgba(57, 35, 21, 0.08);
      padding: 64px 24px 72px;
    }

    .phone {
      position: relative;
      width: 248px;
      min-height: 540px;
      margin: 0 auto;
      border: 2px solid var(--frame);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .phone-top {
      height: 62px;
      background: var(--top-bg);
      padding: 11px 16px;
    }

    .back {
      border: 0;
      padding: 0;
      background: transparent;
      color: #504a47;
      font-size: 19px;
      cursor: pointer;
    }

    .verification-card {
      min-height: 468px;
      margin-top: -6px;
      background: #fff;
      border-radius: 28px 28px 0 0;
      box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.05);
      position: relative;
      padding: 188px 14px 62px;
      text-align: center;
    }

    .status-icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #76ff61, var(--success));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 48px;
      line-height: 1;
      box-shadow: 0 10px 20px rgba(55, 242, 22, 0.24);
    }

    .progress-line {
      width: 92px;
      height: 4px;
      margin: 0 auto 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff6759, var(--danger));
      transform-origin: left center;
      animation: pulseLine 1.8s ease-in-out infinite;
    }

    .status-text {
      margin: 0;
      font-size: 10px;
      font-weight: 700;
      color: #3d3430;
      letter-spacing: 0.1px;
    }

    .captcha {
      position: absolute;
      right: 10px;
      bottom: 8px;
      width: 34px;
      height: 34px;
      border: 1px solid #dcdcdc;
      background:
        linear-gradient(135deg, #ffffff 35%, #e7f1ff 35% 62%, #ffffff 62%),
        #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    @keyframes pulseLine {
      0%,
      100% {
        transform: scaleX(0.82);
        opacity: 0.85;
      }

      50% {
        transform: scaleX(1);
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 12px, 100%);
        padding-top: 10px;
      }

      .sheet {
        padding: 24px 12px 28px;
      }

      .phone {
        width: min(100%, 248px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <article class="phone">
        <div class="phone-top">
          <button class="back" id="backBtn" type="button" aria-label="Back">&#8592;</button>
        </div>

        <div class="verification-card">
          <div class="status-icon" aria-hidden="true">&#10003;</div>
          <div class="progress-line" aria-hidden="true"></div>
          <p class="status-text" id="statusText">Background Verification In Progress.....</p>
          <div class="captcha" aria-hidden="true"></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const backBtn = document.getElementById("backBtn");
    const statusText = document.getElementById("statusText");

    backBtn.addEventListener("click", function() {
      alert("Back to check details screen.");
    });

    setInterval(function() {
      if (statusText.textContent.endsWith(".....")) {
        statusText.textContent = "Background Verification In Progress...";
      } else {
        statusText.textContent = "Background Verification In Progress.....";
      }
    }, 900);
  </script>
</body>
</html>
