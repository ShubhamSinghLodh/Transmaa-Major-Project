<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 7 - Driver Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #f7f2eb;
      --paper: #fffdfa;
      --paper-edge: #eaded2;
      --ink: #201613;
      --muted: #7c6d64;
      --frame: #6f6159;
      --line: #e5d8d0;
      --peach: #f8d8cc;
      --peach-deep: #f3c9bb;
      --accent: #f5a11d;
      --accent-deep: #ef8b05;
      --otp: #f6b3c1;
      --field-border: #d9b9b0;
      --shadow: 0 8px 18px rgba(53, 32, 21, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(243, 228, 214, 0.76), rgba(255, 255, 255, 0) 8%, rgba(255, 255, 255, 0) 92%, rgba(243, 228, 214, 0.76)),
        var(--page-bg);
    }

    .page {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .sheet {
      min-height: 740px;
      background: var(--paper);
      border-top: 4px solid #efe4da;
      border-bottom: 4px solid #d9ccc0;
      box-shadow: 0 3px 12px rgba(57, 35, 21, 0.08);
      padding: 68px 42px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 560px;
      margin: 0 auto;
    }

    .phone {
      position: relative;
      min-height: 286px;
      border: 2px solid var(--frame);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .phone.tall {
      min-height: 278px;
    }

    .top {
      min-height: 86px;
      background: linear-gradient(180deg, var(--peach), var(--peach-deep));
      border-bottom: 1px solid #e9d8d0;
      padding: 7px 10px 10px;
    }

    .back {
      border: 0;
      padding: 0;
      background: transparent;
      color: #5d4f48;
      font-size: 14px;
      cursor: pointer;
    }

    .brand {
      text-align: center;
      margin-top: 2px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 1px;
      font-size: 15px;
      font-weight: 700;
      color: #2c211c;
      text-transform: uppercase;
      letter-spacing: 0.25px;
      transform: skewX(-10deg);
    }

    .brand-mark .accent {
      color: #ea6930;
    }

    .brand h1 {
      margin: 6px 0 2px;
      font-size: 14px;
      line-height: 1.1;
    }

    .brand p {
      margin: 0;
      font-size: 8px;
      line-height: 1.45;
      color: var(--muted);
    }

    .content {
      position: relative;
      padding: 8px 8px 36px;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-bottom: 8px;
    }

    .progress span {
      height: 3px;
      border-radius: 999px;
      background: #cdc0b8;
    }

    .progress span.active {
      background: var(--accent);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 8px;
      font-weight: 600;
      color: #6f5d55;
    }

    .otp-line {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 22px;
      border: 1.5px solid var(--field-border);
      background: #fff;
      overflow: hidden;
    }

    .country {
      width: 22px;
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--line);
      color: #786a61;
      font-size: 7px;
    }

    .otp-line input {
      width: 100%;
      min-height: 22px;
      border: 0;
      outline: none;
      padding: 0 6px;
      font: 500 8px/1 "Poppins", sans-serif;
      color: #5f5048;
      background: transparent;
    }

    .small-btn {
      margin-right: 3px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent-deep));
      color: #fff;
      padding: 3px 8px;
      font-size: 7px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .label {
      display: block;
      margin: 6px 0 3px;
      font-size: 7px;
      font-weight: 600;
      color: #78665d;
    }

    .otp-row {
      display: flex;
      gap: 5px;
      margin-top: 2px;
    }

    .otp-box {
      width: 17px;
      height: 21px;
      border: 0;
      border-radius: 1px;
      background: var(--otp);
      text-align: center;
      color: #874758;
      font: 700 9px/1 "Poppins", sans-serif;
      outline: none;
    }

    .otp-box:focus {
      background: #f59fb1;
      box-shadow: 0 0 0 2px rgba(245, 161, 29, 0.15);
    }

    .otp-note {
      margin-top: 10px;
      text-align: center;
      font-size: 6.5px;
      color: #e0b3a4;
    }

    .field,
    .select-field,
    .textarea {
      width: 100%;
      border: 1.5px solid var(--field-border);
      background: #fff;
      color: #5f5048;
      font: 500 8px/1.3 "Poppins", sans-serif;
      outline: none;
      padding: 6px;
    }

    .field,
    .select-field {
      min-height: 22px;
    }

    .textarea {
      min-height: 44px;
      resize: none;
    }

    .select-field {
      appearance: none;
      background:
        linear-gradient(45deg, transparent 50%, #8f7c73 50%),
        linear-gradient(135deg, #8f7c73 50%, transparent 50%),
        linear-gradient(to right, transparent, transparent);
      background-position:
        calc(100% - 10px) calc(50% - 1px),
        calc(100% - 6px) calc(50% - 1px),
        0 0;
      background-size: 4px 4px, 4px 4px, 100% 100%;
      background-repeat: no-repeat;
    }

    .photo-wrap {
      text-align: center;
      margin-bottom: 6px;
    }

    .photo-title {
      display: block;
      margin-bottom: 4px;
      font-size: 7px;
      font-weight: 600;
      color: #746159;
    }

    .avatar {
      width: 48px;
      height: 48px;
      margin: 0 auto;
      border-radius: 50%;
      border: 4px solid #101010;
      background:
        radial-gradient(circle at 50% 33%, #f7d0a0 0 18%, transparent 19%),
        linear-gradient(180deg, #1f3a8a 0 40%, #f7d0a0 40% 48%, #171717 48% 100%);
    }

    .captcha {
      position: absolute;
      right: 7px;
      bottom: 6px;
      width: 20px;
      height: 20px;
      border: 1px solid #dcdcdc;
      background:
        linear-gradient(135deg, #ffffff 35%, #e7f1ff 35% 62%, #ffffff 62%),
        #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    .next-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffb660, #ef6f4c);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(239, 111, 76, 0.24);
    }

    .next-btn span {
      position: relative;
      left: 1px;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 12px, 100%);
        padding-top: 10px;
      }

      .sheet {
        padding: 22px 12px 30px;
      }

      .grid {
        grid-template-columns: 1fr;
        max-width: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="sheet">
      <div class="grid">
        <article class="phone">
          <div class="top">
            <button class="back" type="button" aria-label="Back">&#8592;</button>
            <div class="brand">
              <div class="brand-mark">
                <span>Tran</span><span class="accent">S</span><span>Maa</span>
              </div>
              <h1>Welcome</h1>
              <p>"Unlock Your Journey"<br>Register Today</p>
            </div>
          </div>

          <div class="content">
            <div class="progress">
              <span class="active"></span>
              <span></span>
              <span></span>
            </div>

            <div class="section-head">
              <span> <b>Registration</b></span>
            </div>

            <div class="otp-line">
              <span class="country">+91</span>
              <input id="phoneOne" type="tel" value="8688474431" aria-label="Phone number">
              <button class="small-btn" id="getOtpBtn" type="button">Get OTP</button>
            </div>

            <label class="label">OTP</label>
            <div class="otp-row">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" value="7" aria-label="OTP digit 1">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" value="5" aria-label="OTP digit 2">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" value="1" aria-label="OTP digit 3">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" value="2" aria-label="OTP digit 4">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" value="6" aria-label="OTP digit 5">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" value="3" aria-label="OTP digit 6">
            </div>

            <div class="otp-note" id="otpTimer">Resend OTP in 96 seconds</div>
            <div class="captcha" aria-hidden="true"></div>
          </div>
        </article>

        <article class="phone">
          <div class="top">
            <button class="back" type="button" aria-label="Back">&#8592;</button>
            <div class="brand">
              <div class="brand-mark">
                <span>Tran</span><span class="accent">S</span><span>Maa</span>
              </div>
              <h1>Welcome</h1>
              <p>"Unlock Your Journey"<br>Register Today</p>
            </div>
          </div>

          <div class="content">
            <div class="progress">
              <span class="active"></span>
              <span></span>
              <span></span>
            </div>

            <div class="section-head">
              <span> <b>Registration</b></span>
            </div>

            <div class="otp-line">
              <span class="country">+91</span>
              <input id="phoneTwo" type="tel" value="8688474431" aria-label="Phone number">
              <button class="small-btn" id="resendOtpBtn" type="button">Get OTP</button>
            </div>

            <label class="label">OTP</label>
            <div class="otp-row">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" aria-label="OTP digit 1">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" aria-label="OTP digit 2">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" aria-label="OTP digit 3">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" aria-label="OTP digit 4">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" aria-label="OTP digit 5">
              <input class="otp-box" type="text" maxlength="1" inputmode="numeric" aria-label="OTP digit 6">
            </div>

            <div class="otp-note" id="otpState">Resend OTP in 120 seconds</div>
          </div>
        </article>

        <article class="phone tall">
          <div class="content">
            <div class="progress">
              <span class="active"></span>
              <span class="active"></span>
              <span></span>
            </div>

            <div class="section-head">
              <span> <b>Personal Information</b></span>
            </div>

            <label class="label" for="driverName">Name</label>
            <input class="field" id="driverName" type="text" value="mahesh" aria-label="Name">

            <label class="label" for="driverDob">Date of Birth</label>
            <input class="field" id="driverDob" type="date" value="1999-04-01" aria-label="Date of birth">
            <!-- <input class="field" id="driverDob" type="text" value="1999-04-01" aria-label="Date of birth"> -->

            <!-- <label for="gender">Select Gender:</label> -->
    <select id="gender" name="gender" required>
        <option value=""> gender </option>
        <option value="male">Male </option>
        <option value="female">Female </option>
        <option value="other">Other </option>
    </select>


            <label class="label" for="driverBio">Bio</label>
            <textarea class="textarea" id="driverBio" aria-label="Bio">good</textarea>

            <button class="next-btn" id="savePersonalBtn" type="button" aria-label="Next">
              <span>&#8594;</span>
            </button>
            <div class="captcha" aria-hidden="true"></div>
          </div>
        </article>

        <article class="phone tall">
          <div class="content">
            <div class="photo-wrap">
              <span class="photo-title">Upload pic</span>
              <div class="avatar" aria-hidden="true"></div>  
               <!-- Placeholder for profile picture upload -->
            </div>

            <div class="section-head">
              <span> <b>Experience and Data</b></span>
            </div>

            <label class="label" for="experienceYears">Years of Experience</label>
            <input class="field" id="experienceYears" type="text" value="7" aria-label="Years of experience">
            
            <select class="select-field" id="vehicleType" aria-label="Vehicle type">
              <option selected>Mini/pickup</option>
              <option>Pickup</option>
              <option>Open truck</option>
            </select>
            
            <label class="label" for="vehicleNumber">Vehicle Model</label>
            <input class="field" id="vehicleNumber" type="text" value="TATA ACE" aria-label="Vehicle number">
            
            <label class="label" for="vehicleType">Vehicle Number</label>
            <input class="field" id="vehicleType" type="text" value="TS23AB5029" aria-label="DL number">
            
            
            <label class="label" for="dlNumber">DL No</label>
            <input class="field" id="dlNumber" type="text" value="IB34567890987654" aria-label="DL number">

            <label class="label" for="panNumber">PAN No</label>
            <input class="field" id="panNumber" type="text" value="LJKBH4567L" aria-label="PAN number">

            <button class="next-btn" id="finishBtn" type="button" aria-label="Finish">
              <span>&#8594;</span>
            </button>
            <div class="captcha" aria-hidden="true"></div>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script>
    const phoneFields = [document.getElementById("phoneOne"), document.getElementById("phoneTwo")];
    const otpInputs = Array.from(document.querySelectorAll(".otp-box"));
    const otpTimer = document.getElementById("otpTimer");
    const otpState = document.getElementById("otpState");
    const getOtpBtn = document.getElementById("getOtpBtn");
    const resendOtpBtn = document.getElementById("resendOtpBtn");
    const savePersonalBtn = document.getElementById("savePersonalBtn");
    const finishBtn = document.getElementById("finishBtn");

    let seconds = 14;
    let timerId;

    function cleanPhone(input) {
      input.value = input.value.replace(/\D/g, "").slice(0, 10);
    }

    function refreshOtpText() {
      if (seconds <= 0) {
        otpTimer.textContent = "OTP ready to resend";
        otpState.textContent = "OTP ready to resend";
        resendOtpBtn.textContent = "Resend";
        clearInterval(timerId);
        return;
      }

      otpTimer.textContent = "Resend OTP in " + seconds + " seconds";
      otpState.textContent = "Resend OTP in " + seconds + " seconds";
    }

    function startTimer() {
      clearInterval(timerId);
      seconds = 96;
      resendOtpBtn.textContent = "Get OTP";
      refreshOtpText();

      timerId = setInterval(function() {
        seconds -= 1;
        refreshOtpText();
      }, 1000);
    }

    // function startTimer() {
    //   clearInterval(timerId);
    //   seconds = 120;
    //   resendOtpBtn.textContent = "Get OTP";
    //   refreshOtpText();

    //   timerId = setInterval(function() {
    //     seconds -= 1;
    //     refreshOtpText();
    //   }, 1000);
    // }

    phoneFields.forEach(function(field) {
      field.addEventListener("input", function() {
        cleanPhone(field);
      });
    });

    otpInputs.forEach(function(input, index) {
      input.addEventListener("input", function() {
        input.value = input.value.replace(/\D/g, "").slice(0, 1);

        if (input.value && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
          otpInputs[index + 1].select();
        }
      });

      input.addEventListener("keydown", function(event) {
        if (event.key === "Backspace" && !input.value && index > 0) {
          otpInputs[index - 1].focus();
          otpInputs[index - 1].select();
        }
      });
    });

    getOtpBtn.addEventListener("click", function() {
      startTimer();
      alert("OTP sent successfully.");
    });

    resendOtpBtn.addEventListener("click", function() {
      startTimer();
      alert("OTP sent again.");
    });

    savePersonalBtn.addEventListener("click", function() {
      alert("Personal information saved.");
    });

    finishBtn.addEventListener("click", function() {
      alert("Driver registration submitted.");
    });

    startTimer();
  </script>
</body>
</html>
